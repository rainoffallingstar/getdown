name: e2e-download

on:
  workflow_dispatch:
    inputs:
      gse:
        description: "GEO GSE accession (small preferred)"
        required: false
        default: "GSE10072"
      sra_accession:
        description: "SRA accession for search e2e"
        required: false
        default: "SRR390728"
      sra_download_accession:
        description: "SRA accession for download e2e (small preferred)"
        required: false
        default: "SRR000001"
      tcga_project:
        description: "TCGA project id"
        required: false
        default: "TCGA-CHOL"
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test (offline e2e + unit)
        run: go test ./...

      - name: Build
        run: go build ./cmd/getdown

      - name: Check optional SRA decode backend
        run: |
          if command -v fasterq-dump >/dev/null 2>&1; then
            echo "fasterq-dump is available; SRA decode can run in this environment."
          else
            echo "fasterq-dump is not installed in this workflow."
            echo "Real e2e covers direct-link SRA downloads; SRA decode is covered by Go unit tests with a mock backend."
          fi

      - name: Search + Download GEO/TCGA
        env:
          GSE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.gse || 'GSE10072' }}
          SRA_ACCESSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sra_accession || 'SRR390728' }}
          SRA_DOWNLOAD_ACCESSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sra_download_accession || 'SRR000001' }}
          TCGA_PROJECT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tcga_project || 'TCGA-CHOL' }}
        run: |
          set -euo pipefail
          rm -rf _ci_out
          mkdir -p _ci_out

          retry() {
            local n=0
            until [ "$n" -ge 3 ]; do
              "$@" && return 0
              n=$((n+1))
              sleep 10
            done
            return 1
          }

          search_and_check() {
            local name="$1"
            local expect="$2"
            shift 2
            retry ./getdown search --json "$@" > "_ci_out/${name}.json"
            test -s "_ci_out/${name}.json"
            grep -q "\"source\": \"${expect}\"" "_ci_out/${name}.json"
          }

          search_and_check "search_geo_${GSE}" "geo" --source geo "${GSE}"
          search_and_check "search_sra_${SRA_ACCESSION}" "sra" --source sra "${SRA_ACCESSION}"
          search_and_check "search_tcga_${TCGA_PROJECT}" "tcga" --source tcga "${TCGA_PROJECT}"
          search_and_check "search_xena_${TCGA_PROJECT}" "xena" --source xena "${TCGA_PROJECT}"
          search_and_check "search_all_${TCGA_PROJECT}" "tcga" --source all "${TCGA_PROJECT}"
          grep -q "\"source\": \"xena\"" "_ci_out/search_all_${TCGA_PROJECT}.json"

          retry ./getdown sra  --accession "${SRA_DOWNLOAD_ACCESSION}" --kind sra --out "_ci_out/sra_${SRA_DOWNLOAD_ACCESSION}" --timeout 40m
          test -s "_ci_out/sra_${SRA_DOWNLOAD_ACCESSION}/runinfo.tsv"
          test -s "_ci_out/sra_${SRA_DOWNLOAD_ACCESSION}/links.tsv"
          test -s "_ci_out/sra_${SRA_DOWNLOAD_ACCESSION}/metadata.json"
          find "_ci_out/sra_${SRA_DOWNLOAD_ACCESSION}/files" -type f | grep -q .
          retry ./getdown geo  --gse "${GSE}" --out "_ci_out/geo_${GSE}" --timeout 20m
          set +e
          retry ./getdown geo  --gse "gse235527" --out "_ci_out/geo_GSE235527" --timeout 90m
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "== GSE235527 supplementary report (if any) =="
            cat _ci_out/geo_GSE235527/supplementary/_report.tsv 2>/dev/null || true
            exit "$rc"
          fi
          retry ./getdown tcga --project "${TCGA_PROJECT}" --out "_ci_out/tcga_${TCGA_PROJECT}" --provider gdc --timeout 40m
          retry ./getdown tcga --project "${TCGA_PROJECT}" --out "_ci_out/tcga_${TCGA_PROJECT}_xena" --provider xena --timeout 40m

          echo "== sra files =="
          find "_ci_out/sra_${SRA_DOWNLOAD_ACCESSION}" -type f -print | sed -n '1,200p'
          echo "== outputs =="
          find _ci_out -maxdepth 5 -type f -print | sed -n '1,300p'

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: getdown-e2e-outputs
          path: _ci_out
          if-no-files-found: error
